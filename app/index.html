<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Runs before first paint to avoid a flash of the wrong theme — same
      // storage key/resolution logic as ThemeContext.tsx, so React's mount
      // just re-applies the already-correct class rather than flashing.
      ;(function () {
        try {
          var pref = localStorage.getItem('ozzbooks_theme_preference')
          var resolved =
            pref === 'light' || pref === 'dark'
              ? pref
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          if (resolved === 'dark') document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1e293b" />

    <!-- iOS "Add to Home Screen" PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OzzBooks" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <title>OzzBooks</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
